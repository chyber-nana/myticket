<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticket Administration — Teens in Christ Ministry</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell admin-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">Administration</p>
        <h1>Ticket Approval</h1>
      </div>
      <a class="text-link" href="/">Public page</a>
    </header>

    <section class="account-panel" id="adminLoginPanel">
      <h2>Admin sign in</h2>
      <form id="adminLoginForm" class="inline-form">
        <input type="password" name="password" placeholder="Admin password" required>
        <button type="submit">Sign In</button>
      </form>
      <p id="adminLoginMessage" class="form-message"></p>
    </section>

    <section class="account-panel hidden" id="adminPanel">
      <div class="admin-toolbar">
        <div>
          <p class="eyebrow">Verification</p>
          <h2>Check a ticket code</h2>
        </div>
        <form id="verifyForm" class="inline-form compact">
          <input type="text" name="code" placeholder="TKT-2026-XXXXXXXX" required>
          <button type="submit">Verify</button>
        </form>
      </div>
      <div id="verifyOutput" class="status-list"></div>

      <hr>

      <div class="admin-toolbar">
        <div>
          <p class="eyebrow">Requests</p>
          <h2>Ticket requests</h2>
        </div>
        <select id="statusFilter">
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="all">All</option>
        </select>
      </div>
      <div id="requestsOutput" class="request-list"></div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
